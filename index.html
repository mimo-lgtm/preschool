<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来を育む教育特区・市民提案広場</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome (アイコン用：以前使われていた場合はそのまま有効になります) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/releases/v5.15.4/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #e3f2fd 0%, #f1f8ff 100%); border-bottom: 1px solid #dee2e6; }
        .perspective-box { background-color: #f8f9fa; border-left: 4px solid #198754; padding: 10px 15px; margin-bottom: 10px; border-radius: 4px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .clickable-header { cursor: pointer; transition: background-color 0.2s ease; }
        .clickable-header:hover { background-color: #f1f8ff !important; }
        .card { border-radius: 8px; }
        .badge { font-size: 0.85em; padding: 0.4em 0.6em; }
    </style>
</head>
<body>

    <!-- 🌐 ヘッダーエリア -->
    <div class="hero-section py-4 mb-4">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <h1 class="fw-bold text-dark mb-2">✨ 教育特区・市民提案広場</h1>
                    <p class="text-secondary mb-0">市民の皆さんのアイデアをAIが整理し、未来の教育特区構想へ繋げます。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 🏛️ メインコンテンツエリア -->
    <div class="container mb-5">
        <div class="row g-4">
            
            <!-- 👈 左側列：ご意見投稿 ＆ AI壁打ちフィードバック -->
            <div class="col-lg-5">
                
                <!-- 1. 入力カード -->
                <div class="card shadow-sm p-4 mb-4 bg-white border-0">
                    <h5 class="fw-bold mb-3 text-dark d-flex align-items-center">
                        <span class="me-2">✍️</span>あなたの意見を届ける
                    </h5>
                    <div class="mb-3">
                        <label for="content" class="form-label small text-muted">教育や子育てに関するアイデアや想いを自由に入力してください</label>
                        <textarea id="content" class="form-control" rows="7" placeholder="（例）幼稚園と保育園の垣根をなくし、どの施設でも質の高い幼児教育がシームレスに受けられる仕組みを作ってほしい..."></textarea>
                    </div>
                    <button id="btnAiAnalysis" class="btn btn-primary w-100 fw-bold py-2.5 shadow-sm">
                        ✨ 1. 意見を送信してAIと壁打ちする
                    </button>
                </div>

                <!-- 2. AIからの提案・整理結果（スクリーンショットのUIを100%完全再現） -->
                <div class="card shadow-sm p-4 bg-white border-0 d-none" id="aiAssistBox">
                    <h5 class="fw-bold text-success mb-4 d-flex align-items-center">
                        <span class="me-2">🤖</span>AIからの提案・整理結果
                    </h5>
                    
                    <!-- 推奨タイトル -->
                    <div class="mb-4 pb-2 border-bottom">
                        <span class="badge bg-primary mb-2">AI推奨タイトル</span>
                        <h5 id="aiTitleText" class="fw-bold text-dark mb-1">--</h5>
                    </div>

                    <!-- 論点・概要 -->
                    <div class="mb-4 pb-2 border-bottom">
                        <span class="badge bg-secondary mb-2">意見の論点・概要</span>
                        <p id="aiSummaryText" class="text-muted small lh-base mb-1">--</p>
                    </div>

                    <!-- 5つの視点 -->
                    <div class="mb-4 pb-2 border-bottom">
                        <span class="badge bg-success mb-3">💡 5つの視点による深掘り</span>
                        <div id="aiPerspectivesText" class="small text-dark">
                            <!-- JavaScriptからここにa〜eの枠が綺麗に挿入されます -->
                        </div>
                    </div>

                    <!-- 配置・統合判定 -->
                    <div class="mb-4 pb-2 border-bottom">
                        <span class="badge bg-warning text-dark mb-2">🔗 配置・統合判定</span>
                        <div id="aiMergeReasonText" class="text-muted small lh-base mb-1">--</div>
                    </div>

                    <!-- 200字要約 -->
                    <div class="mb-4">
                        <span class="badge bg-dark mb-2">📝 提案箱用 200字要約</span>
                        <p id="aiRefinedText" class="text-dark small lh-base mb-0" style="background-color: #f1f3f5; padding: 12px; border-radius: 6px; border-left: 3px solid #212529;">--</p>
                    </div>

                    <!-- 投稿ボタン -->
                    <button id="btnSubmitToBox" class="btn btn-success w-100 fw-bold py-2.5 shadow-sm mt-3">
                        📥 2. この内容で提案箱へ投稿する
                    </button>
                </div>
            </div>

            <!-- 👉 右側列：みんなのアイデアの地図（アコーディオン） ＆ 届いた提案箱一覧 -->
            <div class="col-lg-7">
                
                <!-- アイデアの地図（アコーディオンが展開するエリア） -->
                <div class="card shadow-sm p-4 mb-4 bg-white border-0">
                    <h5 class="fw-bold text-dark mb-3 d-flex align-items-center">
                        <span class="me-2">🗺️</span>みんなのアイデアの地図
                    </h5>
                    <p class="text-muted small mb-3">5つの基本方針をクリックすると、市民から寄せられた各テーマの提案が確認できます。</p>
                    
                    <div id="matrixContainer">
                        <!-- ここに以前の「5つの基本方針」アコーディオンが自動出力されます -->
                    </div>
                </div>

                <!-- 届いた提案箱（新着一覧エリア） -->
                <div class="card shadow-sm p-4 bg-white border-0">
                    <h5 class="fw-bold text-dark mb-3 d-flex align-items-center">
                        <span class="me-2">📥</span>届いた提案箱（一覧）
                    </h5>
                    <p class="text-muted small mb-3">リアルタイムで集約された市民の意見一覧です。</p>
                    
                    <div id="listContainer" style="max-height: 500px; overflow-y: auto;">
                        <!-- ここに新着リストが出力されます -->
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <!-- 👣 フッター -->
    <footer class="bg-white border-top py-3 text-center text-muted small mt-auto">
        <div class="container">
            &copy; 2026 教育特区推進市民会議 &middot; AI市民対話プラットフォームシステム
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>
    <!-- 連携スクリプト -->
    <script src="app.js"></script>
</body>
</html>
