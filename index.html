<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civic Compass Portal</title>
  <link rel="stylesheet" href="style.css">
  <!-- 既存のアイコン・グラフライブラリをそのまま継承 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- ヘッダーおよびナビゲーション（3ページに集約） -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo-area">
        <i class="fa-solid fa-compass compass-icon"></i>
        <h1>Civic Compass <span class="sub-title">都市の未来を描く</span></h1>
      </div>
      <!-- ご指定の3つのボタン名へ変更し、3ページ構成に削減 -->
      <nav class="nav-buttons">
        <button class="nav-btn active" onclick="switchTab('map')"><i class="fa-solid fa-map"></i> アイデアの地図</button>
        <button class="nav-btn" onclick="switchTab('chat')"><i class="fa-solid fa-comments"></i> AI壁打ち</button>
        <button class="nav-btn" onclick="switchTab('box')"><i class="fa-solid fa-inbox"></i> 提案箱</button>
      </nav>
    </div>
  </header>

  <!-- メインコンテンツ領域 -->
  <main class="main-wrapper">
    
    <!-- 1. アイデアの地図 ページ -->
    <section id="page-map" class="tab-content active">
      <div class="vision-section">
        <div class="vision-card-header">
          <h2><i class="fa-solid fa-eye"></i> 現在の Civic Vision</h2>
          <span id="vision-v-tag" class="v-tag">---</span>
        </div>
        <p id="vision-text-display" class="vision-p">読み込み中...</p>
        <div id="vision-image-wrapper" class="vision-img-zone" style="display:none;"></div>
      </div>

      <div class="dashboard-grid">
        <div class="list-container">
          <div class="list-header-bar">
            <h3><i class="fa-solid fa-list"></i> 収集・統合された提案一覧</h3>
            <span id="total-count-badge" class="badge-count">0 件</span>
          </div>
          <!-- カテゴリフィルター（既存のMAIN_CATEGORIESと連動） -->
          <div id="category-filter-bar" class="filter-flex"></div>
          <div id="proposals-list-target" class="cards-vertical-list">
            <p class="status-msg">データを読み込んでいます...</p>
          </div>
        </div>
        
        <!-- 統計サイドバー（既存のグラフ表示をそのまま維持） -->
        <div class="stats-sidebar">
          <div class="sidebar-card">
            <h3><i class="fa-solid fa-chart-pie"></i> 分類別ウエイト</h3>
            <div class="chart-holder">
              <canvas id="weightChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. AI壁打ち ページ -->
    <section id="page-chat" class="tab-content">
      <div class="chat-layout">
        <div class="chat-instruction">
          <h3><i class="fa-solid fa-robot"></i> AIファシリテーターとの壁打ち</h3>
          <p>あなたの意見やアイデアを自由に入力してください。AIが多角的な視点から分析・深掘りをお手伝いします。</p>
        </div>
        <div class="chat-input-zone">
          <textarea id="chat-input-text" placeholder="ここにあなたの意見を入力（例：駅前に子どもが遊べる屋内施設が欲しい、など）..."></textarea>
          <button id="btn-analyze" onclick="startAIAnalysis()"><i class="fa-solid fa-paper-plane"></i> 分析を実行する</button>
        </div>
        <!-- AIからの返答展開エリア -->
        <div id="ai-response-wrapper" class="ai-box" style="display:none;">
          <div class="ai-res-header"><h4><i class="fa-solid fa-wand-magic-sparkles"></i> AIによる分析・多角化視点</h4></div>
          <div id="ai-res-content" class="ai-res-body"></div>
          <div class="ai-save-action">
            <button id="btn-save-post" onclick="saveProposalToSheet()"><i class="fa-solid fa-floppy-disk"></i> この内容を提案箱へ送る</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 3. 提案箱 ページ -->
    <section id="page-box" class="tab-content">
      <div class="box-layout">
        <div class="box-intro">
          <h3><i class="fa-solid fa-envelope-open-text"></i> 直投稿・提案箱</h3>
          <p>AIの壁打ちを経ずに、直接アイデアをシステムへ投稿・ストックすることができます。</p>
        </div>
        <div class="direct-form">
          <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="direct-title" placeholder="提案のタイトル（20字以内推奨）">
          </div>
          <div class="form-group">
            <label>提案本文</label>
            <textarea id="direct-fulltext" placeholder="具体的な提案内容を入力してください..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>投稿者名</label>
              <input type="text" id="direct-author" placeholder="匿名市民">
            </div>
            <div class="form-group">
              <label>備考</label>
              <input type="text" id="direct-note" placeholder="自由記述欄">
            </div>
          </div>
          <button id="btn-direct-submit" onclick="submitDirectProposal()"><i class="fa-solid fa-share-from-square"></i> 提案箱に直接投稿する</button>
        </div>
      </div>
    </section>

  </main>

  <!-- 既存の統合詳細表示用モーダルウィンドウを100%流用 -->
  <div id="detail-modal" class="modal-overlay" style="display:none;">
    <div class="modal-window">
      <div class="modal-header">
        <h3 id="modal-title">提案詳細</h3>
        <button class="modal-close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-meta-row">
          <span id="modal-badge-main" class="badge">---</span>
          <span id="modal-badge-sub" class="badge badge-sub">---</span>
          <span id="modal-badge-status" class="badge badge-status">---</span>
        </div>
        <div class="modal-section">
          <h4>200字要約</h4>
          <p id="modal-summary" class="modal-p-box"></p>
        </div>
        <div class="modal-section">
          <h4>詳細内容・元の投稿</h4>
          <p id="modal-fulltext" class="modal-p-box style-pre"></p>
        </div>
        <div id="modal-extra-info" class="modal-footer-meta"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
